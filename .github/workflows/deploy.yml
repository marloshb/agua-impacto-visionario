name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Sem cache: npm ci exige lockfile 100% sincronizado com package.json,
          # e este projeto é gerenciado pelo Bun no Lovable (bun.lockb é o lockfile real).
          # Usamos "npm install" abaixo para regenerar/atualizar o package-lock no runner.

      - name: Install dependencies (npm install, NOT npm ci)
        # npm install tolera package-lock defasado e adiciona pacotes novos
        # (jspdf, html2canvas, @types/leaflet, etc) que o Bun instalou localmente.
        # --legacy-peer-deps: react-leaflet@5 pede React 19, mas usamos React 18.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Copy 404.html for SPA fallback
        # Garante que o 404.html do public/ seja usado pelo GitHub Pages para rotas do React Router.
        run: cp dist/404.html dist/404.html 2>/dev/null || cp public/404.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
